global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Prometheus monitoring itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # nginx metrics via the exporter sidecar
  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
