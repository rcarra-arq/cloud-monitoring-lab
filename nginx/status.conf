# Internal-only endpoint with nginx's built-in counters
# (connections, requests). The nginx-prometheus-exporter scrapes it
# and translates it into Prometheus metrics. Port 8081 is NOT
# published to the host in docker-compose.yml - it only exists on the
# internal container network.
server {
    listen 8081;

    location /stub_status {
        stub_status;
        access_log off;
    }
}
