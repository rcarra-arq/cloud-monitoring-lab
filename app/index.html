<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Monitoring Lab</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 40px;
      background: #111827;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 10px;
    }

    p {
      line-height: 1.6;
      color: #cbd5e1;
    }

    .badge {
      display: inline-block;
      margin-top: 15px;
      padding: 6px 12px;
      background: #1e293b;
      border-radius: 20px;
      font-size: 12px;
      color: #38bdf8;
    }

    .tech {
      margin-top: 20px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Cloud Monitoring DevOps Lab</h1>

    <p>
      A DevOps learning project simulating a CI/CD pipeline using Docker and GitHub Actions.
      This project demonstrates containerization and automation concepts used in modern cloud environments.
    </p>

    <div class="badge">CI/CD • Docker • GitHub Actions</div>

    <p class="tech">
      Built as a hands-on DevOps learning exercise.
    </p>
  </div>
</body>
</html>
